# =============================================================================
# La Grieta — Railway Configuration
# Docs: https://docs.railway.app/reference/config-as-code
#
# This file configures the API service. Each service in Railway can have its
# own railway.toml; this one lives at the repo root and targets the API.
# =============================================================================

[build]
# Use the repo-root Dockerfile (multi-stage, Alpine, bcryptjs-safe).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Pass the pnpm version as a build arg so Corepack pins the right version.
# Must match the `packageManager` field in root package.json.
[build.args]
PNPM_VERSION = "9.0.0"

[deploy]
# The compiled NestJS entry point inside the runner stage WORKDIR (/app).
startCommand = "node dist/main.js"

numReplicas = 1

# Restart the container on non-zero exit — covers crashes and OOM kills.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check — Railway waits for 200 before marking the deploy healthy.
# /api/health is the NestJS TerminusModule endpoint.
# 120s timeout covers cold-start Drizzle migrations on first deploy.
[deploy.healthcheck]
path = "/api/health"
timeoutSeconds = 120
intervalSeconds = 10
