name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs on the same branch/PR to save CI minutes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pins the pnpm version to match packageManager field in root package.json.
  PNPM_VERSION: '9.0.0'
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job: install
  # Installs dependencies and caches them for all downstream jobs.
  # ---------------------------------------------------------------------------
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  # ---------------------------------------------------------------------------
  # Job: type-check
  # Runs TypeScript compiler in --noEmit mode across all packages via Turborepo.
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-type-check-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-type-check-

      - name: Type check
        run: pnpm type-check

  # ---------------------------------------------------------------------------
  # Job: lint
  # Runs ESLint + Prettier check across all packages.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-lint-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-lint-

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  # ---------------------------------------------------------------------------
  # Job: test
  # Runs unit/integration tests, uploads coverage report as an artifact.
  # Requires build to complete first (Turborepo: test dependsOn ^build).
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lagrieta
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: lagrieta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lagrieta -d lagrieta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://lagrieta:ci_test_password@localhost:5432/lagrieta_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_jwt_secret_at_least_32_chars_long
      JWT_ACCESS_TOKEN_TTL: '900'
      JWT_REFRESH_TOKEN_TTL: '2592000'
      API_PORT: '3001'
      API_PREFIX: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-test-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-test-

      - name: Run tests with coverage
        run: pnpm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage/'
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job: build
  # Builds all packages. Runs after lint + type-check to fail fast on obvious
  # errors before spending time on the full build.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-build-

      - name: Build all packages
        run: pnpm build

      - name: Save Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-build-${{ github.sha }}
